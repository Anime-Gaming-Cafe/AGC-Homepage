services:
  app:
    image: oven/bun:1-alpine
    working_dir: /app
    command: sh -c "bun install --frozen-lockfile && bun run dev"
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
